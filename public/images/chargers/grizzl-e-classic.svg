<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Heavy-duty wall mount -->
  <rect x="55" y="18" width="90" height="10" rx="2" fill="#a1a1aa"/>
  <rect x="60" y="12" width="10" height="12" rx="1" fill="#a1a1aa"/>
  <rect x="130" y="12" width="10" height="12" rx="1" fill="#a1a1aa"/>
  <!-- Main body - rugged rectangular -->
  <rect x="50" y="28" width="100" height="95" rx="4" fill="#a1a1aa"/>
  <rect x="54" y="32" width="92" height="87" rx="3" fill="#2a2a2a"/>
  <!-- Reinforced border look -->
  <rect x="54" y="32" width="92" height="87" rx="3" fill="none" stroke="#a1a1aa" stroke-width="1.5"/>
  <!-- Heavy duty ridges -->
  <line x1="58" y1="38" x2="142" y2="38" stroke="#a1a1aa" stroke-width="0.5" opacity="0.5"/>
  <line x1="58" y1="44" x2="142" y2="44" stroke="#a1a1aa" stroke-width="0.5" opacity="0.5"/>
  <!-- Status LED -->
  <circle cx="100" cy="55" r="5" fill="#22c55e"/>
  <!-- Rating/power label area -->
  <rect x="72" y="68" width="56" height="18" rx="2" fill="#1a1a1a"/>
  <rect x="78" y="73" width="18" height="8" rx="1" fill="#a1a1aa" opacity="0.4"/>
  <rect x="100" y="73" width="22" height="8" rx="1" fill="#a1a1aa" opacity="0.4"/>
  <!-- Heavy cable exit -->
  <rect x="90" y="119" width="20" height="10" rx="3" fill="#a1a1aa"/>
  <!-- Thick cable -->
  <path d="M100,129 C100,142 88,148 88,162" fill="none" stroke="#a1a1aa" stroke-width="4" stroke-linecap="round"/>
  <!-- Rugged connector -->
  <rect x="82" y="162" width="13" height="18" rx="2" fill="#f4f4f5"/>
  <rect x="84" y="172" width="9" height="4" rx="1" fill="#a1a1aa"/>
  <rect x="84" y="162" width="9" height="3" rx="1" fill="#a1a1aa"/>
</svg>