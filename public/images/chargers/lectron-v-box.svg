<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Wall mount bracket -->
  <rect x="70" y="20" width="60" height="8" rx="2" fill="#a1a1aa"/>
  <!-- Main charger body - rectangular -->
  <rect x="60" y="28" width="80" height="100" rx="6" fill="#a1a1aa"/>
  <rect x="65" y="33" width="70" height="90" rx="4" fill="#2a2a2a"/>
  <!-- Display area -->
  <rect x="75" y="45" width="50" height="25" rx="3" fill="#1a1a1a"/>
  <!-- LED status light -->
  <circle cx="100" cy="85" r="4" fill="#22c55e"/>
  <!-- Ventilation lines -->
  <line x1="80" y1="100" x2="120" y2="100" stroke="#a1a1aa" stroke-width="0.5"/>
  <line x1="80" y1="105" x2="120" y2="105" stroke="#a1a1aa" stroke-width="0.5"/>
  <line x1="80" y1="110" x2="120" y2="110" stroke="#a1a1aa" stroke-width="0.5"/>
  <!-- Cable -->
  <path d="M100,128 C100,145 85,150 85,165" fill="none" stroke="#a1a1aa" stroke-width="3" stroke-linecap="round"/>
  <!-- Connector plug -->
  <rect x="80" y="165" width="10" height="15" rx="2" fill="#f4f4f5"/>
  <rect x="82" y="180" width="6" height="4" rx="1" fill="#a1a1aa"/>
</svg>