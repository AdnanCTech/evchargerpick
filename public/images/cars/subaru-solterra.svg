<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80">
  <!-- Subaru Solterra: Compact SUV, boxy-ish, rugged plastic cladding -->
  <path d="M22,52 L26,52 L30,40 L42,28 L56,22 L146,22 L156,26 L166,36 L176,46 L180,52 L22,52 Z" fill="white"/>
  <!-- Lower body / sill with cladding -->
  <path d="M20,52 L182,52 L182,57 Q182,59 180,59 L22,59 Q20,59 20,57 Z" fill="white"/>
  <!-- Plastic body cladding -->
  <path d="M22,52 L180,52 L180,54 L22,54 Z" fill="white" opacity="0.5"/>
  <!-- Window -->
  <path d="M48,26 L144,26 L152,30 L160,38 L46,38 L42,32 Z" fill="#111111" opacity="0.3"/>
  <!-- Roof rail -->
  <path d="M56,22 L146,22" fill="none" stroke="white" stroke-width="1.2" opacity="0.3"/>
  <!-- Character line -->
  <path d="M32,44 L172,44" fill="none" stroke="white" stroke-width="0.5" opacity="0.35"/>
  <!-- Wheel well cutouts -->
  <path d="M38,59 Q38,46 52,46 Q66,46 66,59" fill="#111111"/>
  <path d="M140,59 Q140,46 152,46 Q164,46 164,59" fill="#111111"/>
  <!-- Wheels -->
  <circle cx="52" cy="59" r="9.5" fill="#111111" stroke="white" stroke-width="1.5"/>
  <circle cx="52" cy="59" r="4.5" fill="#333" stroke="white" stroke-width="0.8"/>
  <circle cx="152" cy="59" r="9.5" fill="#111111" stroke="white" stroke-width="1.5"/>
  <circle cx="152" cy="59" r="4.5" fill="#333" stroke="white" stroke-width="0.8"/>
</svg>
