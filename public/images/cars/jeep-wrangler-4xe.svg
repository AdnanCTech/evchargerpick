  <circle cx="170" cy="40" r="12" fill="#111" stroke="white" stroke-width="2"/>
  <circle cx="170" cy="40" r="5" fill="#333" stroke="white" stroke-width="1"/>
  <!-- Front wheel -->
  <circle cx="50" cy="60" r="12" fill="#111" stroke="white" stroke-width="2"/>
  <circle cx="50" cy="60" r="5" fill="#333" stroke="white" stroke-width="1"/>
  <!-- Rear wheel -->
  <circle cx="140" cy="60" r="12" fill="#111" stroke="white" stroke-width="2"/>
  <circle cx="140" cy="60" r="5" fill="#333" stroke="white" stroke-width="1"/>
</svg>
