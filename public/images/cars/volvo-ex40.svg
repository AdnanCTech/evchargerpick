<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80">
  <!-- Volvo EX40: Compact SUV, clean Scandi design, Thor's hammer lights -->
  <path d="M22,54 L26,54 L30,42 L42,30 L58,24 L144,24 L156,28 L166,38 L176,48 L180,54 L22,54 Z" fill="white"/>
  <!-- Lower body / sill -->
  <path d="M20,54 L182,54 L182,58 Q182,60 180,60 L22,60 Q20,60 20,58 Z" fill="white"/>
  <!-- Window - clean upright Volvo proportions -->
  <path d="M50,28 L142,28 L150,32 L160,40 L48,40 L44,34 Z" fill="#111111" opacity="0.3"/>
  <!-- Thor's hammer headlight -->
  <path d="M28,42 L34,38 L34,46" fill="none" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <!-- Clean body line -->
  <path d="M32,46 L174,46" fill="none" stroke="white" stroke-width="0.5" opacity="0.35"/>
  <!-- Rear C-shaped tail light -->
  <path d="M176,42 L178,46 L176,50" fill="none" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <!-- Wheel well cutouts -->
  <path d="M40,60 Q40,48 52,48 Q64,48 64,60" fill="#111111"/>
  <path d="M142,60 Q142,48 154,48 Q166,48 166,60" fill="#111111"/>
  <!-- Wheels -->
  <circle cx="52" cy="60" r="9" fill="#111111" stroke="white" stroke-width="1.5"/>
  <circle cx="52" cy="60" r="4" fill="#333" stroke="white" stroke-width="0.8"/>
  <circle cx="154" cy="60" r="9" fill="#111111" stroke="white" stroke-width="1.5"/>
  <circle cx="154" cy="60" r="4" fill="#333" stroke="white" stroke-width="0.8"/>
</svg>
