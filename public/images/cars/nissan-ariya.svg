<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80">
  <!-- Nissan Ariya: Mid-size crossover, smooth flowing lines, split headlights -->
  <path d="M22,54 L26,54 L32,42 L44,30 L60,24 L142,24 L156,28 L166,38 L176,48 L180,54 L22,54 Z" fill="white"/>
  <!-- Lower body / sill -->
  <path d="M20,54 L182,54 L182,58 Q182,60 180,60 L22,60 Q20,60 20,58 Z" fill="white"/>
  <!-- Window - smooth crossover shape -->
  <path d="M52,28 L140,28 L150,32 L160,40 L50,40 L46,34 Z" fill="#111111" opacity="0.3"/>
  <!-- Smooth character line -->
  <path d="M34,46 L172,46" fill="none" stroke="white" stroke-width="0.5" opacity="0.35"/>
  <!-- V-motion grille hint -->
  <path d="M28,44 L32,40 L32,50" fill="none" stroke="white" stroke-width="0.6" opacity="0.3"/>
  <!-- Wheel well cutouts -->
  <path d="M40,60 Q40,48 52,48 Q64,48 64,60" fill="#111111"/>
  <path d="M140,60 Q140,48 152,48 Q164,48 164,60" fill="#111111"/>
  <!-- Wheels -->
  <circle cx="52" cy="60" r="9" fill="#111111" stroke="white" stroke-width="1.5"/>
  <circle cx="52" cy="60" r="4" fill="#333" stroke="white" stroke-width="0.8"/>
  <circle cx="152" cy="60" r="9" fill="#111111" stroke="white" stroke-width="1.5"/>
  <circle cx="152" cy="60" r="4" fill="#333" stroke="white" stroke-width="0.8"/>
</svg>
